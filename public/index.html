<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLI Chat Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/xterm@5.3.0/css/xterm.css"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1020;
        --panel: #1a1a2e;
        --panel-border: rgba(137, 180, 250, 0.18);
        --text: #e6edf7;
        --muted: #9aa6bf;
        --accent: #7dd3fc;
        --mobile-control-bar-height: 132px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(125, 211, 252, 0.12), transparent 30%),
          linear-gradient(180deg, #111322 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
      }

      .app {
        min-height: 100vh;
        padding: 20px;
        display: flex;
        align-items: stretch;
        justify-content: center;
      }

      .terminal-shell {
        position: relative;
        width: min(1200px, 100%);
        display: flex;
        flex-direction: column;
        height: calc(100vh - 40px);
        max-height: 100vh;
        background: rgba(26, 26, 46, 0.94);
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        padding: 18px;
        overflow: hidden;
      }

      .terminal-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 24%);
      }

      .terminal-header {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
        padding: 2px 4px 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .dots {
        display: flex;
        gap: 8px;
      }

      .font-controls {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .font-btn {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid var(--panel-border);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 120ms ease, border-color 120ms ease;
      }

      .font-btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .font-btn:active {
        background: rgba(255, 255, 255, 0.15);
      }

      .font-size-label {
        font-size: 11px;
        color: var(--muted);
        min-width: 32px;
        text-align: center;
      }

      .dots span {
        width: 11px;
        height: 11px;
        border-radius: 999px;
      }

      .dots span:nth-child(1) {
        background: #ff5f57;
      }

      .dots span:nth-child(2) {
        background: #febc2e;
      }

      .dots span:nth-child(3) {
        background: #28c840;
      }

      #terminal {
        position: relative;
        z-index: 1;
        flex: 1;
        min-height: 0;
        max-height: 80vh;
        overflow: hidden;
        padding: 14px;
        border-radius: 14px;
        background: #141625;
      }

      .ime-input-bar {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        padding: 10px;
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        background: #141625;
      }

      .ime-input {
        flex: 1;
        min-width: 0;
        border: 1px solid rgba(137, 180, 250, 0.14);
        border-radius: 10px;
        padding: 11px 13px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: inherit;
        outline: none;
      }

      .ime-input::placeholder {
        color: var(--muted);
      }

      .ime-input:focus {
        border-color: rgba(125, 211, 252, 0.4);
        box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.12);
      }

      .ime-send-btn {
        flex: 0 0 auto;
        border: 0;
        border-radius: 10px;
        padding: 11px 16px;
        background: var(--accent);
        color: #08111d;
        font: inherit;
        cursor: pointer;
        transition: filter 120ms ease, transform 120ms ease;
      }

      .ime-send-btn:hover {
        filter: brightness(1.05);
      }

      .ime-send-btn:active {
        transform: translateY(1px);
      }

      #overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 16, 32, 0.72);
        z-index: 2;
      }

      #overlay.visible {
        display: flex;
      }

      .overlay-card {
        text-align: center;
        background: rgba(20, 22, 37, 0.96);
        border: 1px solid rgba(125, 211, 252, 0.24);
        border-radius: 16px;
        padding: 20px 22px;
        box-shadow: 0 14px 48px rgba(0, 0, 0, 0.35);
      }

      .overlay-card p {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 14px;
      }

      .overlay-card button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font: inherit;
        color: #08111d;
        background: var(--accent);
        cursor: pointer;
      }

      .xterm-viewport::-webkit-scrollbar {
        width: 10px;
      }

      .xterm-viewport::-webkit-scrollbar-thumb {
        background: rgba(154, 166, 191, 0.28);
        border-radius: 999px;
      }

      .mobile-control-bar {
        display: none;
      }

      @media (max-width: 768px) {
        .app {
          padding: 12px 12px calc(12px + var(--mobile-control-bar-height));
        }

        .terminal-shell {
          height: calc(100vh - 24px - var(--mobile-control-bar-height));
          padding: 14px;
        }

        #terminal {
          max-height: calc(80vh - var(--mobile-control-bar-height));
        }

        .ime-input-bar {
          padding: 8px;
        }

        .ime-input,
        .ime-send-btn {
          min-height: 44px;
        }

        .mobile-control-bar {
          position: fixed;
          left: 0;
          right: 0;
          bottom: 0;
          z-index: 10;
          display: grid;
          grid-template-rows: repeat(2, minmax(0, 1fr));
          gap: 8px;
          padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
          background: rgba(20, 22, 37, 0.86);
          backdrop-filter: blur(14px);
          -webkit-backdrop-filter: blur(14px);
          border-top: 1px solid var(--panel-border);
        }

        .mobile-control-row {
          display: grid;
          gap: 8px;
        }

        .mobile-control-row[data-row="special"] {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .mobile-control-row[data-row="arrows"] {
          grid-template-columns: repeat(6, minmax(0, 1fr));
        }

        .mobile-control-button {
          min-height: 44px;
          border: 1px solid var(--panel-border);
          border-radius: 12px;
          background: rgba(255, 255, 255, 0.05);
          color: var(--text);
          font: inherit;
          font-size: 14px;
          cursor: pointer;
          touch-action: manipulation;
          transition: background 120ms ease, border-color 120ms ease;
        }

        .mobile-control-button:active,
        .mobile-control-button.is-pressed {
          background: rgba(255, 255, 255, 0.12);
          border-color: rgba(125, 211, 252, 0.28);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="terminal-shell">
        <div class="terminal-header">
          <div class="dots"><span></span><span></span><span></span></div>
          <div class="font-controls">
            <button class="font-btn" id="font-decrease" type="button" title="Decrease font size">−</button>
            <span class="font-size-label" id="font-size-label">14</span>
            <button class="font-btn" id="font-increase" type="button" title="Increase font size">+</button>
          </div>
          <div id="status">Connecting...</div>
        </div>
        <div id="terminal"></div>
        <div class="ime-input-bar">
          <input
            class="ime-input"
            id="ime-input"
            type="text"
            placeholder="IME入力 / Type here..."
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          />
          <button class="ime-send-btn" id="ime-send-btn" type="button">Send</button>
        </div>
        <div id="overlay">
          <div class="overlay-card">
            <p>CLI exited.</p>
            <button id="restart" type="button">Restart session</button>
          </div>
        </div>
      </div>
      <div class="mobile-control-bar" aria-label="Mobile terminal controls">
        <div class="mobile-control-row" data-row="special">
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="enter">Enter</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="tab">Tab</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="esc">Esc</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="ctrl-c">Ctrl+C</button>
        </div>
        <div class="mobile-control-row" data-row="arrows">
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="left">←</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="up">↑</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="down">↓</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="right">→</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="y">Y</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="n">N</button>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://unpkg.com/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://unpkg.com/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
    <script>
      const terminalElement = document.getElementById('terminal');
      const overlay = document.getElementById('overlay');
      const restartButton = document.getElementById('restart');
      const statusElement = document.getElementById('status');
      const imeInput = document.getElementById('ime-input');
      const imeSendButton = document.getElementById('ime-send-btn');
      const mobileControlButtons = document.querySelectorAll('.mobile-control-button');

      const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
      const FONT_SIZE_MIN = 8;
      const FONT_SIZE_MAX = 24;
      const FONT_SIZE_KEY = 'cli-chat-font-size';
      let socket = null;
      let reconnectAttempts = 0;
      let reconnectTimer = null;
      let intentionalClose = false;
      let sessionId = null;

      function saveSessionId(id) {
        sessionId = id;
        document.cookie = 'pty_session=' + encodeURIComponent(id) + ';path=/;max-age=600;SameSite=Strict';
      }

      function loadSessionId() {
        const match = document.cookie.match(/(?:^|;\s*)pty_session=([^;]*)/);
        return match ? decodeURIComponent(match[1]) : null;
      }

      function clearSessionId() {
        sessionId = null;
        document.cookie = 'pty_session=;path=/;max-age=0';
      }

      sessionId = loadSessionId();

      function getTerminalFontSize() {
        const saved = localStorage.getItem(FONT_SIZE_KEY);
        if (saved) {
          const size = parseInt(saved, 10);
          if (size >= FONT_SIZE_MIN && size <= FONT_SIZE_MAX) return size;
        }
        return window.innerWidth <= 768 ? 12 : 14;
      }

      const term = new Terminal({
        convertEol: true,
        cursorBlink: true,
        fontFamily: '"JetBrains Mono", monospace',
        fontSize: getTerminalFontSize(),
        lineHeight: 1.35,
        theme: {
          background: '#141625',
          foreground: '#e6edf7',
          cursor: '#7dd3fc',
          selectionBackground: 'rgba(125, 211, 252, 0.25)',
          black: '#141625',
          red: '#ff7b72',
          green: '#7ee787',
          yellow: '#f2cc60',
          blue: '#79c0ff',
          magenta: '#d2a8ff',
          cyan: '#7dd3fc',
          white: '#e6edf7',
          brightBlack: '#6e7681',
          brightRed: '#ffa198',
          brightGreen: '#56d364',
          brightYellow: '#e3b341',
          brightBlue: '#a5d6ff',
          brightMagenta: '#e2b8ff',
          brightCyan: '#a5f3fc',
          brightWhite: '#f0f6fc'
        }
      });

      const fitAddon = new FitAddon.FitAddon();
      const webLinksAddon = new WebLinksAddon.WebLinksAddon();

      term.loadAddon(fitAddon);
      term.loadAddon(webLinksAddon);
      term.open(terminalElement);
      window.requestAnimationFrame(function () {
        fitAddon.fit();
        sendResize();
        updateFontSizeLabel();
      });
      term.focus();
      term.writeln('\x1b[1;36mCLI chat terminal\x1b[0m');
      term.writeln('\x1b[2mStarting interactive session...\x1b[0m');
      term.writeln('');

      function updateFontSizeLabel() {
        document.getElementById('font-size-label').textContent = term.options.fontSize;
      }

      function changeFontSize(delta) {
        const current = term.options.fontSize || 14;
        const next = Math.min(FONT_SIZE_MAX, Math.max(FONT_SIZE_MIN, current + delta));
        if (next === current) return;
        term.options.fontSize = next;
        localStorage.setItem(FONT_SIZE_KEY, String(next));
        fitAddon.fit();
        sendResize();
        updateFontSizeLabel();
      }

      function sendResize() {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          return;
        }

        socket.send(
          JSON.stringify({
            type: 'resize',
            cols: term.cols,
            rows: term.rows
          })
        );
      }

      function scheduleReconnect() {
        if (reconnectTimer) {
          return;
        }

        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
        term.writeln('\r\n\x1b[33mReconnecting in ' + (delay / 1000) + 's...\x1b[0m');
        statusElement.textContent = 'Reconnecting...';
        reconnectTimer = setTimeout(function () {
          reconnectTimer = null;
          reconnectAttempts++;
          connect();
        }, delay);
      }

      function connect() {
        let replaying = false;
        socket = new WebSocket(
          protocol + '://' + window.location.host + '/ws' + (sessionId ? '?sessionId=' + encodeURIComponent(sessionId) : '')
        );

        socket.addEventListener('open', function () {
          statusElement.textContent = 'Connected';
          reconnectAttempts = 0;
          fitAddon.fit();
          sendResize();
        });

        socket.addEventListener('message', function (event) {
          if (typeof event.data !== 'string') {
            return;
          }

          try {
            const payload = JSON.parse(event.data);
            if (payload && payload.type === 'session') {
              saveSessionId(payload.sessionId);
              if (payload.resumed) {
                term.writeln('\r\n\x1b[1;36mSession restored with --resume\x1b[0m\r\n');
              }
              return;
            }
            if (payload && payload.type === 'replay-start') {
              replaying = true;
              term.clear();
              return;
            }
            if (payload && payload.type === 'replay-end') {
              replaying = false;
              return;
            }
            if (payload && payload.type === 'exit') {
              intentionalClose = true;
              clearSessionId();
              statusElement.textContent = 'Disconnected';
              term.writeln('');
              term.writeln('\x1b[33mCLI exited (' + payload.code + ').\x1b[0m');
              overlay.classList.add('visible');
              return;
            }
          } catch (error) {
            // Terminal data is plain text, not JSON.
          }

          term.write(event.data);
        });

        socket.addEventListener('close', function () {
          statusElement.textContent = 'Disconnected';
          if (!intentionalClose) {
            scheduleReconnect();
          }
        });

        socket.addEventListener('error', function () {
          statusElement.textContent = 'Connection error';
          term.writeln('\r\n\x1b[31mWebSocket connection error.\x1b[0m');
        });
      }

      window.addEventListener('resize', function () {
        if (!localStorage.getItem(FONT_SIZE_KEY)) {
          const fontSize = getTerminalFontSize();
          if (term.options.fontSize !== fontSize) {
            term.options.fontSize = fontSize;
          }
        }
        fitAddon.fit();
        sendResize();
        updateFontSizeLabel();
      });

      if (window.ResizeObserver) {
        const observer = new ResizeObserver(function () {
          fitAddon.fit();
          sendResize();
        });
        observer.observe(terminalElement);
      }

      term.onData(function (data) {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(data);
        }
      });

      document.getElementById('font-decrease').addEventListener('click', function () {
        changeFontSize(-1);
      });
      document.getElementById('font-increase').addEventListener('click', function () {
        changeFontSize(1);
      });

      function sendControlKey(data) {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          return;
        }

        socket.send(data);
        if (document.activeElement) {
          document.activeElement.blur();
        }
      }

      function sendImeInput() {
        const text = imeInput.value;
        if (!text || !socket || socket.readyState !== WebSocket.OPEN) {
          imeInput.focus();
          return;
        }

        socket.send(text + '\n');
        imeInput.value = '';
        imeInput.focus();
      }

      function setPressedState(button, pressed) {
        button.classList.toggle('is-pressed', pressed);
      }

      const mobileControlKeyMap = {
        enter: '\r',
        tab: '\t',
        esc: '\x1b',
        'ctrl-c': '\x03',
        left: '\x1b[D',
        up: '\x1b[A',
        down: '\x1b[B',
        right: '\x1b[C',
        y: 'y',
        n: 'n'
      };

      mobileControlButtons.forEach(function (button) {
        const keyData = mobileControlKeyMap[button.dataset.key] || '';
        let touched = false;

        button.addEventListener('touchstart', function (event) {
          event.preventDefault();
          if (document.activeElement) {
            document.activeElement.blur();
          }
          touched = true;
          setPressedState(button, true);
          sendControlKey(keyData);
        }, { passive: false });

        button.addEventListener('touchend', function () {
          setPressedState(button, false);
          window.setTimeout(function () {
            touched = false;
          }, 0);
        });

        button.addEventListener('touchcancel', function () {
          setPressedState(button, false);
          touched = false;
        });

        button.addEventListener('click', function () {
          if (touched) {
            return;
          }

          if (document.activeElement) {
            document.activeElement.blur();
          }
          sendControlKey(keyData);
        });
      });

      imeInput.addEventListener('keydown', function (event) {
        if (event.key !== 'Enter' || event.isComposing) {
          return;
        }

        event.preventDefault();
        sendImeInput();
      });

      imeSendButton.addEventListener('click', function () {
        sendImeInput();
      });

      document.addEventListener('visibilitychange', function () {
        if (
          document.visibilityState === 'visible' &&
          socket &&
          socket.readyState !== WebSocket.OPEN &&
          socket.readyState !== WebSocket.CONNECTING
        ) {
          if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
          }
          reconnectAttempts = 0;
          term.writeln('\r\n\x1b[1;36mReconnecting...\x1b[0m');
          statusElement.textContent = 'Reconnecting...';
          connect();
        }
      });

      restartButton.addEventListener('click', function () {
        intentionalClose = true;
        clearSessionId();
        window.location.reload();
      });

      connect();
    </script>
  </body>
</html>
