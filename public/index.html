<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLI Chat Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1020;
        --panel: #1a1a2e;
        --panel-border: rgba(137, 180, 250, 0.18);
        --text: #e6edf7;
        --muted: #9aa6bf;
        --accent: #7dd3fc;
        --mobile-control-bar-height: 132px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(125, 211, 252, 0.12), transparent 30%),
          linear-gradient(180deg, #111322 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
      }

      .app {
        min-height: 100vh;
        padding: 20px;
        display: flex;
        align-items: stretch;
        justify-content: center;
      }

      .terminal-shell {
        position: relative;
        width: min(1200px, 100%);
        display: flex;
        flex-direction: column;
        height: calc(100vh - 40px);
        max-height: 100vh;
        background: rgba(26, 26, 46, 0.94);
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        padding: 18px;
        overflow: hidden;
      }

      .terminal-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 24%);
      }

      .terminal-header {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
        padding: 2px 4px 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .dots {
        display: flex;
        gap: 8px;
      }

      .font-controls {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .font-btn {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid var(--panel-border);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 120ms ease, border-color 120ms ease;
      }

      .font-btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .font-btn:active {
        background: rgba(255, 255, 255, 0.15);
      }

      .font-size-label {
        font-size: 11px;
        color: var(--muted);
        min-width: 32px;
        text-align: center;
      }

      .dots span {
        width: 11px;
        height: 11px;
        border-radius: 999px;
      }

      .dots span:nth-child(1) {
        background: #ff5f57;
      }

      .dots span:nth-child(2) {
        background: #febc2e;
      }

      .dots span:nth-child(3) {
        background: #28c840;
      }

      #terminal {
        position: relative;
        z-index: 1;
        flex: 1;
        min-height: 0;
        max-height: 80vh;
        overflow: hidden;
        padding: 14px;
        border-radius: 14px;
        background: #141625;
      }

      .ime-input-bar {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        padding: 10px;
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        background: #141625;
      }

      .ime-input {
        flex: 1;
        min-width: 0;
        border: 1px solid rgba(137, 180, 250, 0.14);
        border-radius: 10px;
        padding: 11px 13px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: inherit;
        outline: none;
      }

      .ime-input::placeholder {
        color: var(--muted);
      }

      .ime-input:focus {
        border-color: rgba(125, 211, 252, 0.4);
        box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.12);
      }

      .ime-send-btn {
        flex: 0 0 auto;
        border: 0;
        border-radius: 10px;
        padding: 11px 16px;
        background: var(--accent);
        color: #08111d;
        font: inherit;
        cursor: pointer;
        transition: filter 120ms ease, transform 120ms ease;
      }

      .ime-send-btn:hover {
        filter: brightness(1.05);
      }

      .ime-send-btn:active {
        transform: translateY(1px);
      }

      #overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 16, 32, 0.72);
        z-index: 2;
      }

      #overlay.visible {
        display: flex;
      }

      .overlay-card {
        text-align: center;
        background: rgba(20, 22, 37, 0.96);
        border: 1px solid rgba(125, 211, 252, 0.24);
        border-radius: 16px;
        padding: 20px 22px;
        box-shadow: 0 14px 48px rgba(0, 0, 0, 0.35);
      }

      .overlay-card p {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 14px;
      }

      .overlay-card button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font: inherit;
        color: #08111d;
        background: var(--accent);
        cursor: pointer;
      }

      .xterm-viewport::-webkit-scrollbar {
        width: 10px;
      }

      .xterm-viewport::-webkit-scrollbar-thumb {
        background: rgba(154, 166, 191, 0.28);
        border-radius: 999px;
      }

      .mobile-control-bar {
        display: none;
      }

      @media (max-width: 768px) {
        .app {
          padding: 12px 12px calc(12px + var(--mobile-control-bar-height));
        }

        .terminal-shell {
          height: calc(100vh - 24px - var(--mobile-control-bar-height));
          padding: 14px;
        }

        #terminal {
          max-height: calc(80vh - var(--mobile-control-bar-height));
        }

        .ime-input-bar {
          padding: 8px;
        }

        .ime-input,
        .ime-send-btn {
          min-height: 44px;
        }

        .xterm-viewport::-webkit-scrollbar {
          width: 10px;
          display: block;
        }

        .xterm-viewport::-webkit-scrollbar-thumb {
          background: rgba(154, 166, 191, 0.5);
          border-radius: 999px;
          min-height: 40px;
        }

        .xterm-viewport::-webkit-scrollbar-track {
          background: rgba(0, 0, 0, 0.2);
          border-radius: 999px;
        }

        .xterm-viewport {
          overflow-y: scroll !important;
        }

        .mobile-control-bar {
          position: fixed;
          left: 0;
          right: 0;
          bottom: 0;
          z-index: 10;
          display: grid;
          grid-template-rows: repeat(2, minmax(0, 1fr));
          gap: 8px;
          padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
          background: rgba(20, 22, 37, 0.86);
          backdrop-filter: blur(14px);
          -webkit-backdrop-filter: blur(14px);
          border-top: 1px solid var(--panel-border);
        }

        .mobile-control-row {
          display: grid;
          gap: 8px;
        }

        .mobile-control-row[data-row="special"] {
          grid-template-columns: repeat(6, minmax(0, 1fr));
        }

        .mobile-control-row[data-row="arrows"] {
          grid-template-columns: repeat(8, minmax(0, 1fr));
        }

        .mobile-control-button {
          min-height: 44px;
          border: 1px solid var(--panel-border);
          border-radius: 12px;
          background: rgba(255, 255, 255, 0.05);
          color: var(--text);
          font: inherit;
          font-size: 14px;
          cursor: pointer;
          touch-action: manipulation;
          transition: background 120ms ease, border-color 120ms ease;
        }

        .mobile-control-button:active,
        .mobile-control-button.is-pressed {
          background: rgba(255, 255, 255, 0.12);
          border-color: rgba(125, 211, 252, 0.28);
        }

        .shift-toggle-btn.is-active {
          background: rgba(125, 211, 252, 0.25);
          border-color: rgba(125, 211, 252, 0.5);
          color: #7dd3fc;
          box-shadow: 0 0 10px rgba(125, 211, 252, 0.2);
        }

        .ctrl-toggle-btn.is-active {
          background: rgba(126, 231, 135, 0.25);
          border-color: rgba(126, 231, 135, 0.5);
          color: #7ee787;
          box-shadow: 0 0 10px rgba(126, 231, 135, 0.2);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="terminal-shell">
        <div class="terminal-header">
          <div class="dots"><span></span><span></span><span></span></div>
          <div class="font-controls">
            <button class="font-btn" id="font-decrease" type="button" title="Decrease font size">−</button>
            <span class="font-size-label" id="font-size-label">14</span>
            <button class="font-btn" id="font-increase" type="button" title="Increase font size">+</button>
          </div>
          <div id="status">Connecting...</div>
        </div>
        <div id="terminal"></div>
        <div class="ime-input-bar">
          <input
            class="ime-input"
            id="ime-input"
            type="text"
            placeholder="IME入力 / Type here..."
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          />
          <button class="ime-send-btn" id="ime-send-btn" type="button">Send</button>
        </div>
        <div id="overlay">
          <div class="overlay-card">
            <p>CLI exited.</p>
            <button id="restart" type="button">Restart session</button>
          </div>
        </div>
      </div>
      <div class="mobile-control-bar" aria-label="Mobile terminal controls">
        <div class="mobile-control-row" data-row="special">
          <button class="mobile-control-button shift-toggle-btn" type="button" tabindex="-1" data-key="shift">⇧</button>
          <button class="mobile-control-button ctrl-toggle-btn" type="button" tabindex="-1" data-key="ctrl">Ctrl</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="enter">Enter</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="tab">Tab</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="esc">Esc</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="ctrl-c">Ctrl+C</button>
        </div>
        <div class="mobile-control-row" data-row="arrows">
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="pgup">PgUp</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="left">←</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="up">↑</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="down">↓</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="right">→</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="pgdn">PgDn</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="y">Y</button>
          <button class="mobile-control-button" type="button" tabindex="-1" data-key="n">N</button>
        </div>
      </div>
    </div>

    <script src="/client.js"></script>
    <script>
      const terminalElement = document.getElementById('terminal');
      const overlay = document.getElementById('overlay');
      const restartButton = document.getElementById('restart');
      const statusElement = document.getElementById('status');
      const imeInput = document.getElementById('ime-input');
      const imeSendButton = document.getElementById('ime-send-btn');
      const mobileControlButtons = document.querySelectorAll('.mobile-control-button');
      const shiftToggleButton = document.querySelector('.shift-toggle-btn');
      const ctrlToggleButton = document.querySelector('.ctrl-toggle-btn');

      const FONT_SIZE_MIN = 8;
      const FONT_SIZE_MAX = 24;
      const FONT_SIZE_KEY = 'cli-chat-font-size';
      let shiftActive = false;
      let ctrlActive = false;

      function getTerminalFontSize() {
        const saved = localStorage.getItem(FONT_SIZE_KEY);
        if (saved) {
          const size = parseInt(saved, 10);
          if (size >= FONT_SIZE_MIN && size <= FONT_SIZE_MAX) return size;
        }
        return window.innerWidth <= 768 ? 12 : 14;
      }

      const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
      const chatTerminal = new window.ChatTerminal(terminalElement, {
        wsUrl: protocol + '://' + window.location.host + '/ws',
        fontSize: getTerminalFontSize(),
        fontFamily: '"JetBrains Mono", monospace',
        onConnect: function () {
          statusElement.textContent = 'Connected';
          overlay.classList.remove('visible');
        },
        onDisconnect: function () {
          statusElement.textContent = 'Disconnected';
        },
        onExit: function (event) {
          statusElement.textContent = 'Disconnected';
          overlay.classList.add('visible');
          if (chatTerminal.terminal) {
            chatTerminal.terminal.writeln('');
            chatTerminal.terminal.writeln('\x1b[33mCLI exited (' + event.code + ').\x1b[0m');
          }
        }
      });

      function updateFontSizeLabel() {
        const currentFontSize = chatTerminal.terminal
          ? chatTerminal.terminal.options.fontSize
          : getTerminalFontSize();
        document.getElementById('font-size-label').textContent = currentFontSize;
      }

      function changeFontSize(delta) {
        if (!chatTerminal.terminal) return;

        const current = chatTerminal.terminal.options.fontSize || 14;
        const next = Math.min(FONT_SIZE_MAX, Math.max(FONT_SIZE_MIN, current + delta));
        if (next === current) return;
        localStorage.setItem(FONT_SIZE_KEY, String(next));
        chatTerminal.setFontSize(next);
        updateFontSizeLabel();
      }

      chatTerminal.ready.then(function () {
        if (!chatTerminal.terminal) return;
        chatTerminal.terminal.writeln('\x1b[1;36mCLI chat terminal\x1b[0m');
        chatTerminal.terminal.writeln('\x1b[2mStarting interactive session...\x1b[0m');
        chatTerminal.terminal.writeln('');
        chatTerminal.terminal.focus();
        updateFontSizeLabel();
      });

      window.addEventListener('resize', function () {
        if (!chatTerminal.terminal) return;

        if (!localStorage.getItem(FONT_SIZE_KEY)) {
          const fontSize = getTerminalFontSize();
          if (chatTerminal.terminal.options.fontSize !== fontSize) {
            chatTerminal.setFontSize(fontSize);
          }
        }
        updateFontSizeLabel();
      });

      document.getElementById('font-decrease').addEventListener('click', function () {
        changeFontSize(-1);
      });
      document.getElementById('font-increase').addEventListener('click', function () {
        changeFontSize(1);
      });

      function applyShiftModifier(data) {
        if (!shiftActive) {
          return data;
        }

        switch (data) {
          case '\x1b[A':
            return '\x1b[1;2A';
          case '\x1b[B':
            return '\x1b[1;2B';
          case '\x1b[C':
            return '\x1b[1;2C';
          case '\x1b[D':
            return '\x1b[1;2D';
          default:
            if (/^[ -~]$/.test(data)) {
              return data.toUpperCase();
            }
            return data;
        }
      }

      function toggleShiftLock() {
        shiftActive = !shiftActive;
        if (shiftToggleButton) {
          shiftToggleButton.classList.toggle('is-active', shiftActive);
        }
      }

      function toggleCtrlLock() {
        ctrlActive = !ctrlActive;
        if (ctrlToggleButton) {
          ctrlToggleButton.classList.toggle('is-active', ctrlActive);
        }
      }

      function toCtrlCharacter(data) {
        return String.fromCharCode(data.toUpperCase().charCodeAt(0) - 64);
      }

      function applyCtrlModifier(data) {
        if (!ctrlActive) {
          return data;
        }

        switch (data) {
          case '\x1b[A':
            return '\x1b[1;5A';
          case '\x1b[B':
            return '\x1b[1;5B';
          case '\x1b[C':
            return '\x1b[1;5C';
          case '\x1b[D':
            return '\x1b[1;5D';
          default:
            if (/^[A-Za-z]$/.test(data)) {
              return toCtrlCharacter(data);
            }
            return data;
        }
      }

      function sendControlKey(data) {
        if (data === 'pgup') {
          if (chatTerminal.terminal) {
            chatTerminal.terminal.scrollPages(-1);
          }
          return;
        }

        if (data === 'pgdn') {
          if (chatTerminal.terminal) {
            chatTerminal.terminal.scrollPages(1);
          }
          return;
        }

        chatTerminal.sendInput(applyCtrlModifier(applyShiftModifier(data)));
        if (document.activeElement) {
          document.activeElement.blur();
        }
        if (chatTerminal.terminal) {
          chatTerminal.terminal.focus();
        }
      }

      function sendImeInput() {
        const text = imeInput.value;
        if (!text) {
          imeInput.focus();
          return;
        }

        let output = shiftActive ? text.toUpperCase() : text;
        if (ctrlActive) {
          output = output.split('').map(function (char) {
            return /^[A-Za-z]$/.test(char) ? toCtrlCharacter(char) : char;
          }).join('');
        }

        chatTerminal.sendInput(output + '\n');
        imeInput.value = '';
        imeInput.focus();
      }

      function setPressedState(button, pressed) {
        button.classList.toggle('is-pressed', pressed);
      }

      const mobileControlKeyMap = {
        enter: '\r',
        tab: '\t',
        esc: '\x1b',
        'ctrl-c': '\x03',
        pgup: 'pgup',
        left: '\x1b[D',
        up: '\x1b[A',
        down: '\x1b[B',
        right: '\x1b[C',
        pgdn: 'pgdn',
        y: 'y',
        n: 'n'
      };

      mobileControlButtons.forEach(function (button) {
        const key = button.dataset.key;
        const keyData = mobileControlKeyMap[button.dataset.key] || '';
        let touched = false;

        button.addEventListener('touchstart', function (event) {
          event.preventDefault();
          if (document.activeElement) {
            document.activeElement.blur();
          }
          touched = true;
          setPressedState(button, true);
          if (key === 'shift') {
            toggleShiftLock();
            return;
          }
          if (key === 'ctrl') {
            toggleCtrlLock();
            return;
          }
          sendControlKey(keyData);
        }, { passive: false });

        button.addEventListener('touchend', function () {
          setPressedState(button, false);
          window.setTimeout(function () {
            touched = false;
          }, 0);
        });

        button.addEventListener('touchcancel', function () {
          setPressedState(button, false);
          touched = false;
        });

        button.addEventListener('click', function () {
          if (touched) {
            return;
          }

          if (document.activeElement) {
            document.activeElement.blur();
          }
          if (key === 'shift') {
            toggleShiftLock();
            return;
          }
          if (key === 'ctrl') {
            toggleCtrlLock();
            return;
          }
          sendControlKey(keyData);
        });
      });

      imeInput.addEventListener('keydown', function (event) {
        if (event.key !== 'Enter' || event.isComposing) {
          return;
        }

        event.preventDefault();
        sendImeInput();
      });

      imeSendButton.addEventListener('click', function () {
        sendImeInput();
      });

      chatTerminal.setInputTransformer(function (data) {
        if (shiftActive && /^[ -~]$/.test(data)) {
          data = data.toUpperCase();
        }

        if (ctrlActive && /^[A-Za-z]$/.test(data)) {
          return applyCtrlModifier(data);
        }

        return data;
      });

      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') {
          statusElement.textContent = 'Reconnecting...';
          chatTerminal.connect();
        }
      });

      restartButton.addEventListener('click', function () {
        window.location.reload();
      });
    </script>
  </body>
</html>
